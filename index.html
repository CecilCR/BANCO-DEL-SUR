<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*,*::before,*::after{box-sizing:border-box}
:root{
--c-navy:#1a365d;--c-navy-mid:#2c5282;--c-amber:#b45309;--c-amber-bg:#fffbeb;--c-amber-border:#fcd34d;
--c-logro-bg:#eff6ff;--c-logro-border:#93c5fd;--c-logro-text:#1e40af;
--c-afil-bg:#f0fdf4;--c-afil-border:#86efac;--c-afil-text:#166534;
--c-poder-bg:#faf5ff;--c-poder-border:#c4b5fd;--c-poder-text:#6b21a8;
}
body{margin:0;padding:0;font-family:var(--font-sans,'Segoe UI',system-ui,sans-serif);color:var(--color-text-primary);line-height:1.6;font-size:15px}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

.hdr{background:var(--c-navy);color:#fff;padding:24px 28px;border-radius:var(--border-radius-lg);margin-bottom:0}
.hdr h1{margin:0 0 4px;font-size:1.4rem;font-weight:500}
.hdr .sub{margin:0 0 16px;font-size:0.9rem;opacity:0.8;font-weight:400}
.hdr p{margin:0;font-size:0.875rem;opacity:0.85;line-height:1.6}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
@media(max-width:500px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:var(--border-radius-md);padding:10px 14px;text-align:center}
.kpi .lbl{font-size:0.72rem;opacity:0.75;margin-bottom:3px}
.kpi .val{font-size:1rem;font-weight:500}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-top:none;flex-wrap:wrap;gap:8px}
.pill{font-size:0.8rem;font-weight:500;padding:5px 14px;border-radius:20px}
.pill-phase{background:var(--color-background-info);color:var(--color-text-info)}
.pill-sel{background:var(--c-amber-bg);color:var(--c-amber);border:0.5px solid var(--c-amber-border)}

.prog-wrap{height:4px;background:var(--color-border-tertiary);margin-bottom:24px}
.prog-fill{height:100%;background:var(--c-amber);transition:width .4s ease;width:20%}

.cand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:24px}
.cand-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:22px;cursor:pointer;transition:border-color .2s,transform .2s;display:flex;flex-direction:column;outline:none}
.cand-card:hover{border-color:var(--c-navy-mid);transform:translateY(-3px)}
.cand-card:focus-visible{box-shadow:0 0 0 3px var(--c-amber-border)}
.cand-card.sel{border:2px solid var(--c-amber);background:var(--c-amber-bg);transform:translateY(-3px)}
.cand-card.done{pointer-events:none;opacity:0.55}
.cand-card.done.sel{opacity:1}

.tag{display:inline-block;font-size:0.72rem;font-weight:500;padding:3px 10px;border-radius:var(--border-radius-md);margin-bottom:10px}
.tag-logro{background:var(--c-logro-bg);color:var(--c-logro-text)}
.tag-afil{background:var(--c-afil-bg);color:var(--c-afil-text)}
.tag-poder{background:var(--c-poder-bg);color:var(--c-poder-text)}

.cand-name{font-size:1.05rem;font-weight:500;color:var(--color-text-primary);margin:0 0 14px}
.sec-lbl{font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--c-amber);margin:0 0 3px;display:block}
.card-body p{font-size:0.875rem;margin:0 0 12px;color:var(--color-text-secondary)}
.risk{background:var(--color-background-danger,#fff5f5);border-left:3px solid var(--color-border-danger,#f87171);padding:10px 12px;font-size:0.82rem;color:var(--color-text-danger,#991b1b);margin-top:auto}

.footer-act{text-align:center;margin-bottom:24px}
.btn-primary{background:var(--c-amber);color:#fff;border:none;padding:14px 48px;font-size:0.95rem;font-weight:500;border-radius:50px;cursor:pointer}
.btn-primary:disabled{background:var(--color-border-secondary);color:var(--color-text-tertiary)}

#feedback{display:none;margin-top:8px;padding:28px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary)}

.tradeoff{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
@media(max-width:500px){.tradeoff{grid-template-columns:1fr}}

.credits{margin-top:40px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary);text-align:center;font-size:0.78rem;color:var(--color-text-tertiary)}

@media (max-width:600px){
body{font-size:16px;line-height:1.7;}
.hdr{padding:18px 16px;}
.hdr h1{font-size:1.2rem;}
.cand-grid{grid-template-columns:1fr;}
.btn-primary{width:100%;}
}
</style>
</head>

<body>

<h2 class="sr-only">Instrumento formativo: selección de liderazgo basado en la teoría de motivación de McClelland</h2>

<div class="hdr">
<h1>Crisis en Sucursal Sur</h1>
<p class="sub">Instrumento de decisión estratégica</p>
</div>

<div class="cand-grid">
<div class="cand-card">Contenido interactivo funcionando</div>
</div>

<button class="btn-primary">Confirmar decisión</button>

<div class="credits">
Elaborado por Cecilia Carrasco Rivera
</div>

<script>
console.log("Simulación operativa");
</script>

</body>
</html>
